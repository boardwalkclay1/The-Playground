<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MCU Breadboard Lab Pro</title>
  <link rel="stylesheet" href="/static/microcontroller-lab.css" />
</head>

<body>
  <div id="app">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="left">
        <div class="title">MCU Breadboard Lab Pro</div>
        <div class="subtitle">ESP32 · Sensors · Wiring · Simulation · AI Assistant</div>
      </div>

      <div class="right">
        <select id="board-select" class="bubble">
          <option value="esp32-devkit-v1">ESP32 DevKit V1</option>
          <option value="esp32-s3">ESP32‑S3</option>
          <option value="esp8266">ESP8266</option>
        </select>

        <button id="toggle-wiring" class="btn">Wire Mode</button>
        <button id="zoom-in" class="btn">+</button>
        <button id="zoom-out" class="btn">−</button>

        <button id="import-project" class="btn">Import Project</button>
        <button id="export-netlist" class="btn">Export Netlist</button>
        <button id="simulate" class="btn primary">Simulate</button>
      </div>
    </header>

    <!-- MAIN GRID -->
    <main class="grid">

      <!-- LEFT PANEL -->
      <section class="panel left-panel">
        <h3>Components</h3>
        <div id="component-palette" class="palette"></div>

        <h3 style="margin-top:20px;">AI Wiring Assistant</h3>
        <textarea id="ai-wiring-input" placeholder="Describe wiring or paste code"></textarea>
        <button id="ai-wiring-run" class="btn full">Generate Wiring</button>
        <button id="ai-wiring-from-code" class="btn full">Wiring From Code</button>
        <button id="ai-code-from-wiring" class="btn full">Code From Wiring</button>
      </section>

      <!-- CENTER PANEL -->
      <section class="panel center-panel">
        <h3>Breadboard</h3>

        <div id="zoom-container">
          <div id="board-layer"></div>
          <svg id="wire-layer"></svg>
          <div id="component-layer"></div>
        </div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="panel right-panel">
        <h3>Netlist</h3>
        <textarea id="netlist" class="netlist"></textarea>

        <h3>Simulation</h3>
        <div id="sim-output" class="sim-output"></div>

        <h3>AI Output</h3>
        <pre id="ai-output" class="ai-output"></pre>
      </section>

    </main>
  </div>

  <script src="/static/microcontroller-lab.js"></script>
</body>
</html>
