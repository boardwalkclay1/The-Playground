<!DOCTYPE html>
<html data-theme="industrial">
<head>
  <meta charset="UTF-8" />
  <title>Boardwalk Playground · Logs</title>
  <link rel="stylesheet" href="/frontend/static/style.css" />
</head>

<body class="layout-page">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="/frontend/static/logo.png" class="logo" />
      <span class="app-title">Boardwalk Playground · Logs</span>
    </div>

    <div class="topbar-right">
      <!-- PROMPT INPUT FOR APP GENERATION -->
      <input 
        id="generator-prompt" 
        class="input prompt-input" 
        placeholder="Enter prompt to generate an app…" 
      />

      <button id="run-generator" class="btn btn-primary">
        Generate
      </button>

      <a href="/" class="btn btn-ghost">Back</a>
      <button id="theme-toggle" class="btn btn-ghost">Theme: Industrial</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="page-main">

    <!-- SYSTEM LOGS -->
    <section class="panel">
      <h2>System Logs</h2>
      <pre id="logs-output" class="log-window"></pre>
    </section>

    <!-- ERROR LOGS -->
    <section class="panel">
      <h2>Preview & Runtime Errors</h2>
      <pre id="errors-output" class="error-window"></pre>
    </section>

  </main>

  <script src="/frontend/static/app.js"></script>
</body>
</html>
