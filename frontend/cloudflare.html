<!DOCTYPE html>
<html data-theme="industrial">
<head>
  <meta charset="UTF-8" />
  <title>Boardwalk Playground · Cloudflare</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="layout-page">
  <header class="topbar">
    <div class="topbar-left">
      <img src="/static/logo.png" class="logo" />
      <span class="app-title">Boardwalk Playground · Cloudflare Suite</span>
    </div>

    <div class="topbar-right">
      <a href="/" class="btn btn-ghost">Back to Dashboard</a>
      <button id="theme-toggle" class="btn btn-ghost">Theme: Industrial</button>
    </div>
  </header>

  <main class="page-main">
    <section class="panel">
      <h2>Cloudflare Controls</h2>

      <div class="field-row">
        <label>Project:
          <input id="cf-project" placeholder="project-name" />
        </label>
      </div>

      <div class="button-grid" style="margin-top:10px;">
        <button class="btn btn-primary" id="cf-deploy-worker">Deploy Worker</button>
        <button class="btn btn-primary" id="cf-deploy-pages">Deploy Pages</button>
        <button class="btn btn-primary" id="cf-create-d1">Create D1</button>
        <button class="btn btn-primary" id="cf-create-r2">Create R2</button>
        <button class="btn btn-primary" id="cf-create-kv">Create KV</button>
        <button class="btn btn-primary" id="cf-create-queue">Create Queue</button>
      </div>

      <div class="log-panel" id="cf-log" style="margin-top:12px;"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
