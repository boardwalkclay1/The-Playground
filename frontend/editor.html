<!DOCTYPE html>
<html data-theme="industrial">
<head>
  <meta charset="UTF-8" />
  <title>Boardwalk Playground · Editor</title>
  <link rel="stylesheet" href="/frontend/static/style.css" />
</head>

<body class="layout-page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="/frontend/static/logo.png" class="logo" />
      <span class="app-title">Boardwalk Playground · Editor</span>
    </div>

    <div class="topbar-right">
      <a href="/" class="btn btn-ghost">Back</a>
      <button id="theme-toggle" class="btn btn-ghost">Theme: Industrial</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="page-main">

    <section class="panel">

      <h2>Editor</h2>

      <!-- FILE META BAR -->
      <div class="editor-meta">

        <label class="bubble-field">
          <span>Project</span>
          <input id="editor-project" class="input" placeholder="project-name" />
        </label>

        <label class="bubble-field">
          <span>Path</span>
          <input id="editor-path" class="input" placeholder="src/index.js" />
        </label>

        <button id="editor-load" class="btn btn-primary">Load</button>
        <button id="editor-save" class="btn btn-primary">Save</button>
        <button id="editor-delete" class="btn btn-danger">Delete File</button>
        <button id="editor-new" class="btn btn-primary">New File</button>

      </div>

      <!-- FULLSCREEN EDITOR -->
      <textarea id="editor-text" class="editor-window"></textarea>

    </section>

  </main>

  <script src="/frontend/static/app.js"></script>
</body>
</html>
