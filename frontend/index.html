<!DOCTYPE html>
<html lang="en" data-theme="industrial">
<head>
  <meta charset="UTF-8" />
  <title>Boardwalk Playground Studio</title>
  <link rel="stylesheet" href="static/style.css" />
</head>

<body class="playground-root">

  <!-- TOP NAV BAR -->
  <header class="pg-topbar">
    <button id="burger" class="pg-burger">☰</button>

    <div class="pg-topbar-title">
      <img src="static/logo.png" class="pg-logo" />
      <div>
        <div class="pg-title">Boardwalk Playground Studio</div>
        <div class="pg-subtitle">Build · Generate · Flash · Deploy</div>
      </div>
    </div>

    <div class="pg-topbar-actions">
      <button id="theme-toggle" class="pg-btn">Theme</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="pg-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="pg-sidebar" id="sidebar">
      <button class="pg-nav-btn" data-panel="projects">Projects</button>
      <button class="pg-nav-btn" data-panel="filetree">File Tree</button>
      <button class="pg-nav-btn" data-panel="generator">Generator</button>
      <button class="pg-nav-btn" data-panel="microcontroller">Microcontroller</button>
      <button class="pg-nav-btn" data-panel="cloudflare">Cloudflare</button>
      <button class="pg-nav-btn" data-panel="capabilities">Capabilities</button>
      <button class="pg-nav-btn" data-panel="settings">Settings</button>
    </aside>

    <!-- MAIN WORK AREA -->
    <main class="pg-main">

      <!-- MAIN SCREEN -->
      <section class="pg-main-screen" id="main-screen">
        <div class="pg-main-header">Main Screen</div>
        <div id="main-content" class="pg-main-content">
          <p class="muted">Your editor, preview, generator, and tools will appear here.</p>
        </div>
      </section>

      <!-- BOTTOM DOCK -->
      <section class="pg-dock">

        <!-- DOCK TABS -->
        <div class="pg-dock-tabs">
          <button class="pg-dock-tab active" data-dock="terminal">Terminal</button>
          <button class="pg-dock-tab" data-dock="errors">Errors</button>
          <button class="pg-dock-tab" data-dock="logs">Logs</button>
        </div>

        <!-- DOCK PANELS -->
        <div class="pg-dock-panels">

          <!-- TERMINAL -->
          <div class="pg-dock-panel" id="dock-terminal">
            <div class="pg-terminal-output" id="terminal-output"></div>
            <div class="pg-terminal-input-row">
              <input id="terminal-input" class="pg-terminal-input" placeholder="Enter command..." />
              <button id="terminal-run" class="pg-btn-accent">Run</button>
              <button id="terminal-clear" class="pg-btn">Clear</button>
            </div>
          </div>

          <!-- ERRORS -->
          <div class="pg-dock-panel hidden" id="dock-errors">
            <div class="pg-errors-output" id="errors-output"></div>
          </div>

          <!-- LOGS -->
          <div class="pg-dock-panel hidden" id="dock-logs">
            <div class="pg-terminal-output" id="logs-output"></div>
          </div>

        </div>
      </section>

    </main>

  </div>

  <!-- AI DRAWER -->
  <div id="dock-ai">
    <div class="pg-ai-output" id="ai-output"></div>
    <div class="pg-ai-input-row">
      <textarea id="ai-input" class="pg-ai-input" placeholder="Ask your AI assistant..."></textarea>
      <button id="ai-send" class="pg-btn-primary">Send</button>
    </div>
  </div>

  <!-- FLOATING AI BUTTON -->
  <button id="ai-float-btn">AI</button>

  <!-- MAIN APP LOGIC -->
  <script src="static/app.js"></script>

</body>
</html>
