<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Boardwalk Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#f5d36b" />

    <link rel="stylesheet" href="./bw-studio.css" />

    <!-- React (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX + ES imports -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Your app (same folder as index.html) -->
    <script type="text/babel" src="./app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </head>

  <body class="theme-gold">
    <!-- Main Studio UI (App Generator, Editor, etc.) -->
    <div id="root"></div>

    <!-- AI Operator Panel (separate engine, wired in app.js) -->
    <div id="ai-console-root"></div>

    <!-- Command Terminal Panel (separate engine, wired in app.js) -->
    <div id="terminal-root"></div>
  </body>
</html>
