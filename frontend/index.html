<!DOCTYPE html>
<html data-theme="industrial">
<head>
  <meta charset="UTF-8" />
  <title>Boardwalk Playground</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body class="layout-two-column">
  <header class="topbar">
    <div class="topbar-left">
      <img src="/static/logo.png" class="logo" />
      <span class="app-title">Boardwalk Playground</span>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-ghost">Theme: Industrial</button>
    </div>
  </header>

  <main class="main-grid">

    <!-- LEFT COLUMN -->
    <aside class="left-column">
      <section class="panel" id="panel-projects"></section>
      <section class="panel" id="panel-filetree"></section>
      <section class="panel" id="panel-plugins"></section>
      <section class="panel" id="panel-cloudflare"></section>
      <section class="panel" id="panel-rundeploy"></section>
      <section class="panel" id="panel-capabilities"></section>

      <!-- NEW: PROMPT PANEL -->
      <section class="panel" id="panel-generator">
        <h3>App Generator</h3>
        <textarea id="generator-input" placeholder="Describe the app you want to build..."></textarea>
        <button id="generator-run" class="btn btn-primary">Generate App</button>
      </section>
    </aside>

    <!-- RIGHT COLUMN -->
    <section class="right-column">

      <!-- PREVIEW PANEL -->
      <section class="panel" id="panel-preview"></section>

      <!-- MAIN VIEW PANEL -->
      <section class="panel" id="panel-main-view"></section>

      <!-- NEW: LOGS PANEL -->
      <section class="panel" id="panel-logs">
        <h3>Build & System Logs</h3>
        <pre id="logs-output"></pre>
      </section>

      <!-- NEW: ERROR PANEL -->
      <section class="panel" id="panel-errors">
        <h3>Preview & Runtime Errors</h3>
        <pre id="errors-output"></pre>
      </section>

    </section>
  </main>

  <script src="static/app.js"></script>
</body>
</html>
